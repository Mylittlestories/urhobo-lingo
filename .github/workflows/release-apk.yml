name: Release APK to GitHub Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK for release
        run: |
          mkdir -p release-out
          cp app/build/outputs/apk/debug/app-debug.apk release-out/urhobo-lingo-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: urhobo-lingo-debug-apk
          path: release-out/urhobo-lingo-debug.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-out/urhobo-lingo-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
